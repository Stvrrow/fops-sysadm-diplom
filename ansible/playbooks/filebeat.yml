---
- name: Install Filebeat
  hosts: web
  become: true

  vars:
    elasticsearch_ip: "192.168.20.15"

  tasks:
    - name: Wait for dpkg lock
      shell: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
      changed_when: false

    - name: Remove old elastic repos
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/elastic-8.x.list
        - /etc/apt/sources.list.d/elastic-7.x.list
        - /etc/apt/sources.list.d/elasticrepo.list

    - name: Add elasticrepo GPG key
      shell: wget -qO - http://elasticrepo.serveradmin.ru/elastic.asc | apt-key add -
      changed_when: false

    - name: Add elasticrepo repository
      copy:
        dest: /etc/apt/sources.list.d/elasticrepo.list
        content: "deb http://elasticrepo.serveradmin.ru bookworm main\n"
        mode: '0644'

    - name: Install Filebeat
      apt:
        name: filebeat
        state: present
        update_cache: true

    - name: Configure Filebeat
      copy:
        dest: /etc/filebeat/filebeat.yml
        mode: '0600'
        content: |
          filebeat.inputs:
            - type: filestream
              id: nginx-access
              enabled: true
              paths:
                - /var/log/nginx/access.log
              fields:
                type: nginx_access
              fields_under_root: true

            - type: filestream
              id: nginx-error
              enabled: true
              paths:
                - /var/log/nginx/error.log
              fields:
                type: nginx_error
              fields_under_root: true

          output.elasticsearch:
            hosts: ["http://{{ elasticsearch_ip }}:9200"]
            index: "nginx-logs-%{+yyyy.MM.dd}"

          setup.ilm.enabled: false
          setup.template.name: "nginx-logs"
          setup.template.pattern: "nginx-logs-*"

          logging.level: info
      notify: Restart filebeat

    - name: Enable and start Filebeat
      systemd:
        name: filebeat
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart filebeat
      systemd:
        name: filebeat
        state: restarted
